<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nate&Co Animated Logo Demo</title>
  <link rel="stylesheet" href="../assets/css/nateandco-logo.css">
    <link rel="icon" href="../../../../assets/imgs/brand/favicon.ico" sizes="any">
    <link rel="icon" href="../../../../assets/imgs/brand/favicon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="../../../../assets/imgs/brand/apple-touch-icon.png">
    <link rel="manifest" href="../../../../assets/imgs/brand/site.webmanifest">
    <meta name="theme-color" content="#07111F">
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 20% 20%, rgba(159,196,255,.16), transparent 28%),
        radial-gradient(circle at 80% 65%, rgba(159,196,255,.08), transparent 30%),
        #07111F;
      color: #E6ECF5;
      font-family: Inter, Arial, sans-serif;
    }

    .demo-card {
      width: min(92vw, 900px);
      padding: 2rem;
      border: 1px solid rgba(230,236,245,.14);
      border-radius: 24px;
      background: rgba(255,255,255,.035);
      box-shadow: 0 24px 80px rgba(0,0,0,.35);
    }

    .demo-card h1 {
      margin: 0 0 1rem;
      font-size: clamp(1.4rem, 4vw, 2.2rem);
      font-weight: 600;
    }

    .demo-card p {
      color: #9FC4FF;
      margin-bottom: 2rem;
    }

    object,
    img {
      width: 100%;
      height: auto;
    }

    .icon-row {
      margin-top: 2rem;
      display: flex;
      gap: 1rem;
      align-items: center;
    }

    .icon-row img {
      width: 96px;
      border-radius: 18px;
    }
  </style>
</head>
<body>
  <main class="demo-card">
    <h1>Nate&Co Animated Orbital Observatory Logo</h1>
    <p>Subtle rotating rings, pulsing signal node, and reduced-motion support.</p>

    <object class="nateco-logo-embed nateco-logo-embed--hero" data="../assets/svg/nateandco-primary-horizontal-animated.svg" type="image/svg+xml"></object>

    <div class="icon-row">
      <img src="../assets/svg/nateandco-icon-animated.svg" alt="Animated Nate&Co icon">
      <span>Icon-only animated variant</span>
    </div>
  </main>
</body>
</html>
