<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Nate&Co - Generic Dungeon Game</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css" />
  <link rel='stylesheet' href='https://fonts.googleapis.com/css?family=Roboto'>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
  <link rel="icon" href="/assets/imgs/favicon-logo-32x32.png" sizes="32x32" type="image/png">
  <style>
      /* html, body, h1, h2, h3, h4, h5, h6 {
          font-family: "Roboto", sans-serif;
      }
      
      body {
          margin: 0;
          min-height: 100vh;
          background: linear-gradient(-45deg, #f3f3f3, #555, #131313, #ffffff);
          background-size: 400% 400%;
          animation: gradientAnimation 10s ease infinite;
      } */
      
      .banner {
          background-color: teal;
          color: white;
          padding: 20px;
          text-align: center;
      }
      
      .navbar {
          display: flex;
          align-items: center;
          justify-content: space-between;
          background-color: teal;
          padding: 10px 20px;
      }
      
      .navbar img {
          width: 50px;
          height: 50px;
          border-radius: 5px;
      }
      
      .nav-links a {
          color: white;
          text-decoration: none;
          padding: 8px 15px;
          transition: 0.3s;
      }
      
      .nav-links a:hover {
          background-color: rgba(255, 255, 255, 0.2);
          border-radius: 5px;
      }
      
      .dropdown {
          position: relative;
          display: inline-block;
      }
      
      .dropdown-content {
          display: none;
          position: absolute;
          right: 0;
          background-color: white;
          min-width: 160px;
          box-shadow: 0px 8px 16px rgba(0,0,0,0.2);
          z-index: 1;
      }
      
      .dropdown-content a {
          color: black;
          padding: 12px 16px;
          display: block;
          text-decoration: none;
      }
      
      .dropdown-content a:hover {
          background-color: #ddd;
      }
      
      .dropdown:hover .dropdown-content {
          display: block;
      }
  </style>
</head>
<body>
  <div id="navbar-container"></div>
    <script>
        fetch("/components/navbar.html")
            .then(response => response.text())
            .then(data => document.getElementById("navbar-container").innerHTML = data)
            .catch(error => console.error("Error loading navbar:", error));
    </script>
  <main class="game-shell">
    <h1>Generic Dungeon Game V1.1</h1>

    <div class="game-layout">
      <aside class="sidebar sidebar-left" aria-label="Game information">
        <section class="panel">
          <h2>Run Info</h2>
          <dl class="stats-list">
            <div><dt>Floor</dt><dd id="floorValue">1</dd></div>
            <div><dt>Score</dt><dd id="scoreValue">0</dd></div>
            <div><dt>Gold</dt><dd id="goldValue">0</dd></div>
          </dl>
        </section>

        <section class="panel">
          <h2>Player</h2>
          <dl class="stats-list">
            <div><dt>Health</dt><dd id="healthValue">30/30</dd></div>
            <div><dt>Armour</dt><dd id="armourValue">0/5</dd></div>
            <div><dt>Chest Key</dt><dd id="keyValue">No</dd></div>
            <div><dt>Dash</dt><dd id="dashValue">Ready</dd></div>
          </dl>
        </section>
      </aside>

      <section class="game-board" aria-label="Dungeon canvas">
        <div class="canvas-wrap">
          <canvas id="dungeonCanvas" width="960" height="560"></canvas>

          <div id="mobileControls" class="mobile-controls" aria-label="Mobile game controls">
            <div id="mobileDpad" class="mobile-joystick" aria-label="Movement joystick">
              <div class="mobile-joystick-base" aria-hidden="true">
                <div id="mobileJoystickKnob" class="mobile-joystick-knob"></div>
              </div>
            </div>

            <div class="mobile-actions" aria-label="Action controls">
              <button class="mobile-action-btn mobile-sprint-btn" data-hold-key="shift" aria-label="Hold to sprint">Sprint</button>
              <button id="mobileDashBtn" class="mobile-action-btn mobile-dash-btn" type="button" aria-label="Dash">Dash</button>
            </div>
          </div>
        </div>
      </section>

      <aside class="sidebar sidebar-right" aria-label="Settings and shop">
        <section class="panel">
          <h2>Actions</h2>
          <div class="controls">
            <button id="generateBtn">Generate Dungeon</button>
          </div>
        </section>

        <section class="panel">
          <h2>Shop</h2>
          <div class="controls">
            <button id="buyMaxHealthBtn">Buy Max Health</button>
            <button id="healBtn">Heal</button>
            <button id="buyArmourBtn">Buy Armour</button>
            <button id="buyDashBtn">Buy Dash Upgrade</button>
          </div>
        </section>

        <section class="panel">
          <h2>Settings</h2>
          <div class="settings-list">
            <label>
              <input id="showCanvasHudToggle" type="checkbox" checked>
              Show canvas HUD
            </label>

            <label class="setting-row setting-row-stacked">
              <span>UI layout</span>
              <select id="uiLayoutSelect">
                <option value="auto">Auto</option>
                <option value="desktop">Desktop sidebars</option>
                <option value="mobile">Mobile stacked</option>
              </select>
            </label>
          </div>
        </section>
      </aside>
    </div>
  </main>

  <script src="js/dom.js"></script>
  <script src="js/config.js"></script>
  <script src="js/state.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/tiles.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/mobileControls.js"></script>
  <script src="js/shop.js"></script>
  <script src="js/dungeon.js"></script>
  <script src="js/render.js"></script>
  <script src="js/player.js"></script>
  <script src="js/enemies.js"></script>
  <script src="js/game.js"></script>
</body>
</html>
