<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nate&Co - OSRS Stats</title>

    <link rel="stylesheet" href="../assets/css/site.css">
    <link rel="icon" href="../assets/imgs/favicon-logo-32x32.png" sizes="32x32" type="image/png">
</head>

<body>
    <div id="navbar-container" data-root="../"></div>

    <main class="page">
        <section class="card section">
            <p class="eyebrow">Old School RuneScape</p>

            <h1 id="playerTitle">Input Your OSRS Username</h1>

            <p class="text-muted">
                Pull OSRS player stats, skills, boss kills, and activities using Wise Old Man data.
            </p>

            <div class="search-bar">
                <input
                    id="textBox"
                    class="input"
                    type="text"
                    placeholder="OSRS Username..."
                />

                <button id="submitBtn" class="button button-primary">
                    Fetch Stats
                </button>
            </div>
        </section>

        <section id="resultsBox" class="results-box section"></section>

        <p class="text-center text-muted">
            Stats provided by
            <a href="https://wiseoldman.net/" target="_blank" rel="noopener noreferrer">
                Wise Old Man
            </a>
        </p>
    </main>

    <script>
        const playerTitle = document.getElementById("playerTitle");
        const textBox = document.getElementById("textBox");
        const submitBtn = document.getElementById("submitBtn");
        const resultsBox = document.getElementById("resultsBox");

        function formatName(name) {
            return name.replaceAll("_", " ");
        }

        function formatNumber(num) {
            return Number(num).toLocaleString();
        }

        function renderSkills(skills) {
            return `
                <section class="card section stats-section">
                    <h2>Skills</h2>
                    <div class="stats-grid">
                        ${Object.values(skills).map(skill => `
                            <article class="stat-card">
                                <h3>${formatName(skill.metric)}</h3>
                                <p>Level: ${skill.level}</p>
                                <p>XP: ${formatNumber(skill.experience)}</p>
                                <p>Rank: ${skill.rank === -1 ? "Unranked" : formatNumber(skill.rank)}</p>
                            </article>
                        `).join("")}
                    </div>
                </section>
            `;
        }

        function renderBosses(bosses) {
            const killedBosses = Object.values(bosses).filter(boss => boss.kills > 0);

            return `
                <section class="card section stats-section">
                    <h2>Bosses</h2>
                    <div class="stats-grid">
                        ${killedBosses.map(boss => `
                            <article class="stat-card">
                                <h3>${formatName(boss.metric)}</h3>
                                <p>Kills: ${formatNumber(boss.kills)}</p>
                                <p>Rank: ${boss.rank === -1 ? "Unranked" : formatNumber(boss.rank)}</p>
                            </article>
                        `).join("")}
                    </div>
                </section>
            `;
        }

        function renderActivities(activities) {
            const activeActivities = Object.values(activities).filter(activity => activity.score > 0);

            return `
                <section class="card section stats-section">
                    <h2>Activities</h2>
                    <div class="stats-grid">
                        ${activeActivities.map(activity => `
                            <article class="stat-card">
                                <h3>${formatName(activity.metric)}</h3>
                                <p>Score: ${formatNumber(activity.score)}</p>
                                <p>Rank: ${activity.rank === -1 ? "Unranked" : formatNumber(activity.rank)}</p>
                            </article>
                        `).join("")}
                    </div>
                </section>
            `;
        }

        function renderPlayer(data) {
            const snapshot = data.latestSnapshot.data;

            playerTitle.textContent = `${data.displayName}'s Stats`;

            resultsBox.innerHTML = `
                <section class="card section profile-summary">
                    <div class="summary-grid">
                        <article class="summary-card">
                            <span>Combat Level</span>
                            <strong>${data.combatLevel}</strong>
                        </article>

                        <article class="summary-card">
                            <span>Total Level</span>
                            <strong>${snapshot.skills.overall.level}</strong>
                        </article>

                        <article class="summary-card">
                            <span>Total XP</span>
                            <strong>${formatNumber(data.exp)}</strong>
                        </article>

                        <article class="summary-card">
                            <span>EHP</span>
                            <strong>${data.ehp.toFixed(2)}</strong>
                        </article>

                        <article class="summary-card">
                            <span>EHB</span>
                            <strong>${data.ehb.toFixed(2)}</strong>
                        </article>
                    </div>
                </section>

                ${renderSkills(snapshot.skills)}
                ${renderBosses(snapshot.bosses)}
                ${renderActivities(snapshot.activities)}
            `;
        }

        async function submitText() {
            const username = textBox.value.trim();

            if (!username) {
                playerTitle.textContent = "Input Your OSRS Username";
                resultsBox.innerHTML = "";
                return;
            }

            playerTitle.textContent = "Loading...";

            resultsBox.innerHTML = `
                <section class="card section">
                    <p>Fetching stats for <strong>${username}</strong>...</p>
                </section>
            `;

            try {
                const response = await fetch(
                    `https://api.wiseoldman.net/v2/players/${encodeURIComponent(username)}`
                );

                if (!response.ok) {
                    throw new Error("API request failed");
                }

                const data = await response.json();
                renderPlayer(data);
            } catch (error) {
                console.error(error);

                playerTitle.textContent = "Input Your OSRS Username";

                resultsBox.innerHTML = `
                    <section class="card section">
                        <h2>Error</h2>
                        <p>Could not fetch stats for that username.</p>
                    </section>
                `;
            }
        }

        submitBtn.addEventListener("click", submitText);

        textBox.addEventListener("keydown", function (event) {
            if (event.key === "Enter") {
                submitText();
            }
        });
    </script>

    <script src="../assets/js/includes.js"></script>
</body>
</html>
